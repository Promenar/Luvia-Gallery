<body class="bg-background text-on-background min-h-screen overflow-x-hidden selection:bg-primary-container selection:text-on-primary-container">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-surface flex justify-between items-center px-margin-mobile py-4 shadow-sm">
<button class="text-on-surface-variant hover:bg-surface-container-high transition-colors active:opacity-80 transition-opacity p-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="menu">menu</span>
</button>
<h1 class="font-headline-md text-headline-md font-bold text-primary">Luvia Gallery</h1>
<button class="text-on-surface-variant hover:bg-surface-container-high transition-colors active:opacity-80 transition-opacity p-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="search">search</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="pt-[80px] pb-[100px] flex flex-col gap-stack-lg">
<!-- Pull to refresh indicator space -->
<div class="w-full flex justify-center py-2 opacity-50">
<div class="w-8 h-1 rounded-full bg-surface-container-highest"></div>
</div>
<!-- Hero Carousel -->
<section class="px-margin-mobile w-full">
<div class="relative w-full aspect-[4/5] md:aspect-[16/9] rounded-xl overflow-hidden bg-surface-container-low shadow-md group border border-outline-variant/20">

<div class="absolute inset-0 flex items-center justify-center pointer-events-none">
<div class="w-16 h-16 rounded-full bg-surface-glass backdrop-blur-md flex items-center justify-center border border-white/20 shadow-xl pointer-events-auto cursor-pointer hover:bg-white/30 transition-colors">
<span class="material-symbols-outlined text-primary text-3xl ml-1" data-icon="play_arrow" data-weight="fill">play_arrow</span>
</div>
</div>
<!-- Gradient Overlay for text readability (if text was added, keeping it for visual depth) -->
<div class="absolute inset-x-0 bottom-0 h-1/3 bg-gradient-to-t from-black/60 to-transparent pointer-events-none"></div>
<!-- Pagination Indicators -->
<div class="absolute bottom-4 left-0 w-full flex justify-center gap-2">
<div class="w-2 h-2 rounded-full bg-primary transition-all shadow-sm"></div>
<div class="w-2 h-2 rounded-full bg-white/50 transition-all shadow-sm"></div>
<div class="w-2 h-2 rounded-full bg-white/50 transition-all shadow-sm"></div>
</div>
</div>
</section>
<!-- Recently Added Section -->
<section class="w-full">
<div class="px-margin-mobile flex justify-between items-end mb-stack-md">
<h2 class="font-headline-sm text-headline-sm text-on-surface">Recently Added</h2>
<button class="font-label-md text-label-md text-primary hover:underline">View All</button>
</div>
<div class="flex overflow-x-auto hide-scrollbar gap-gutter-grid px-margin-mobile pb-4">
<!-- Thumbnail 1 -->
<div class="flex-none w-[120px] aspect-square rounded-lg overflow-hidden bg-surface-card relative group border border-outline-variant/30 shadow-sm">

<div class="absolute inset-0 bg-black/0 group-hover:bg-black/10 transition-colors"></div>
</div>
<!-- Thumbnail 2 -->
<div class="flex-none w-[120px] aspect-square rounded-lg overflow-hidden bg-surface-card relative group border border-outline-variant/30 shadow-sm">
<img alt="Recent media 2" class="w-full h-full object-cover" data-alt="A minimalist architectural shot of a brutalist concrete building against a stark, pitch-black night sky. A single window glows warmly with amber light, providing a sharp contrast to the cold, dark exterior. The geometry of the building creates harsh, clean lines. This image reinforces a sense of modern structure, deep shadows, and high-quality artistic photography suitable for a premium dark theme gallery." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDWJb4gb23fLHs4G30nkmEnRONvH6Vl2HdHf2FAB935TjYsNoZizdySkaKIkoGOVntJvf-kj4k4DgrQNXKHNiBdWjZwuBOe6Vlg4hWHA7AQxXsKrJDEBoqDoK-IvmvGpRtO7g5PPAlFkOFJm422OxcYs_6sq8jtgTatgK1-85yU38nYgwzqf8BsERx4xKdP9pLIyb7a2rtb1te7MVARUqkTrxEoy-fEm_zw2UjPelX6QhCASz1DAPbdcylyt6g-74Lh5mrfnJfJETo"/>
<div class="absolute inset-0 bg-black/0 group-hover:bg-black/10 transition-colors"></div>
</div>
<!-- Thumbnail 3 -->
<div class="flex-none w-[120px] aspect-square rounded-lg overflow-hidden bg-surface-card relative group border border-outline-variant/30 shadow-sm">
<img alt="Recent media 3" class="w-full h-full object-cover" data-alt="Abstract fluid art featuring swirling ribbons of deep crimson and metallic gold against a void-like black background. The textures appear incredibly glossy and tactile, almost like liquid glass. The lighting is dramatic, highlighting the curves and edges of the abstract forms. This high-contrast, moody visual serves as a captivating and sophisticated thumbnail within a minimalist digital art collection." src="https://lh3.googleusercontent.com/aida-public/AB6AXuD9EpzvwL8_OuHyXRD06qAM03_U219SUUG2IdCUSejPivM6wFuTNhgMDJUChpYjFZmw-Z0PVfhyA9kgmOAefRcxsF8hXAZ6yUAzqvD1gao3Q8dRVd9qXN4fQ0JXQvl1-cVWYmNNWKF3HCgVyi-kO4jR1M3npXHJlJhwdutg9Nl00i4kda4XAuhb8xAiVUQ-h4Ll6Eva59dzfEPWN1J0c4wIOGTQAhDSppIzcS_Q-O-Crky-J36IbFW5U-ANtR5IAz6Eikc_aIYsnZk"/>
<div class="absolute inset-0 bg-black/0 group-hover:bg-black/10 transition-colors"></div>

<div class="absolute bottom-1 right-1 w-5 h-5 rounded bg-black/50 backdrop-blur-sm flex items-center justify-center">
<span class="material-symbols-outlined text-[14px] text-white" data-icon="play_arrow" data-weight="fill">play_arrow</span>
</div>
</div>
<!-- Thumbnail 4 -->
<div class="flex-none w-[120px] aspect-square rounded-lg overflow-hidden bg-surface-card relative group border border-outline-variant/30 shadow-sm">

</section>
</main>

<!-- Home (Active) -->
<button class="flex flex-col items-center justify-center bg-primary-container text-on-primary-container rounded-full px-4 py-1 active:scale-95 transition-transform duration-200">
<span class="material-symbols-outlined mb-1" data-icon="home" data-weight="fill">home</span>
<span class="font-label-md text-label-md">Home</span>
</button>
<!-- Gallery -->
<button class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-variant transition-colors rounded-full px-4 py-1 active:scale-95 duration-200">
<span class="material-symbols-outlined mb-1" data-icon="photo_library">photo_library</span>
<span class="font-label-md text-label-md">Gallery</span>
</button>
<!-- Folders -->
<button class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-variant transition-colors rounded-full px-4 py-1 active:scale-95 duration-200">
<span class="material-symbols-outlined mb-1" data-icon="folder">folder</span>
<span class="font-label-md text-label-md">Folders</span>
</button>
<!-- Favorites -->
<button class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-variant transition-colors rounded-full px-4 py-1 active:scale-95 duration-200">
<span class="material-symbols-outlined mb-1" data-icon="favorite">favorite</span>
<span class="font-label-md text-label-md">Favorites</span>
</button>
<!-- Settings -->
<button class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-variant transition-colors rounded-full px-4 py-1 active:scale-95 duration-200">
<span class="material-symbols-outlined mb-1" data-icon="settings">settings</span>
<span class="font-label-md text-label-md">Settings</span>
</button>
</nav>
</body></html>
