<style>
        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined';
            font-weight: normal;
            font-style: normal;
            font-size: 24px;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            display: inline-block;
            white-space: nowrap;
            word-wrap: normal;
            direction: ltr;
            -webkit-font-feature-settings: 'liga';
            -webkit-font-smoothing: antialiased;
        }

<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-background text-on-surface h-screen w-screen overflow-hidden flex flex-col items-center justify-center relative">
<!-- Immersive Blurred Background -->
<div class="absolute inset-0 w-full h-full z-0 overflow-hidden">
<img alt="Immersive Background" class="w-full h-full object-cover scale-110 filter blur-3xl opacity-50 brightness-50" data-alt="A deeply atmospheric, abstract background featuring swirls of deep neon blue and purple colors blending together smoothly. The image is highly blurred, creating a soft, immersive gradient effect that feels like a modern digital art installation or a futuristic dreamscape. The lighting is low-key with vibrant accents, perfectly suited for a sleek, dark-mode user interface aesthetic." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAsYEF140tEIMl3WtHv2ZCKF_pK-8LTXIE67X2rAdo_7I5l9qaVQqTF1fWZaDq4jvDby62dNLmVoXxP9rL2yBSVoxlrlhd4qbRaG-SyI6YVhhAxg72RSf6iCnh44DlBuEPq0rH3Gbc9JUkT36doHsVMGlH0y4cTb048t_zyFFuQC3wx80VK-LOnR3YFBJLUREzO4otDXSjDMnGZPsMhxqfGkFdGh2OHzkyQgOAgzf66f3k5FXW_9Pg97fjJ6AmXEzurYY-1ooPbghc"/>
<div class="absolute inset-0 bg-gradient-to-b from-transparent via-surface-main/50 to-surface-main/90"></div>
</div>
<!-- Top App Bar (Transparent) -->
<div class="absolute top-0 left-0 w-full z-50 flex justify-between items-center px-margin-mobile py-4">
<button class="w-10 h-10 flex items-center justify-center rounded-full bg-surface-glass backdrop-blur-md text-on-surface hover:bg-surface-variant transition-colors">
<span class="material-symbols-outlined">expand_more</span>
</button>
<button class="w-10 h-10 flex items-center justify-center rounded-full bg-surface-glass backdrop-blur-md text-on-surface hover:bg-surface-variant transition-colors">
<span class="material-symbols-outlined">more_vert</span>
</button>
</div>
<!-- Center Content: Album Art & Info -->
<div class="z-10 flex flex-col items-center w-full max-w-md px-margin-mobile mt-[-10vh]">
<!-- Album Cover -->
<div class="w-64 h-64 md:w-80 md:h-80 rounded-2xl overflow-hidden shadow-[0_20px_50px_rgba(0,0,0,0.5)] mb-stack-lg border border-white/5 relative group">
<img alt="Album Cover" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105" data-alt="A striking, modern album cover featuring abstract, flowing shapes in vibrant neon blue and purple hues against a dark, moody background. The composition is dynamic and sleek, evoking a sense of high-fidelity electronic music. The lighting is dramatic, highlighting the smooth curves of the abstract forms, fitting perfectly into a dark-mode minimalist UI." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCYqc3NDqj-cvE8c5uKqeTzl3h2pxIgn3v4A972rl86IExmQ3jXUH0lOC89lz4Jnmhzx5aGS7IRifh9J65dzJm_Bdo2efVNPrWEgYdoliDAj3AJV5YIbW4W9sm3JZuor0OjPPNTXMAT6Mv9DYvhpEquPgZSHO9p95HIHRHAHdYhYi8r_g61cIdW5xnODRSrqo0JOebqLcUNnuwLzMfKuYcP_ccE_kmVf0y0uqXq-dgWiwi72r3q8b27nbo6aWSa1pySKVDg1Iw9-4w"/>
</div>
<!-- Song Info -->
<div class="text-center w-full px-4 mb-8">
<h1 class="font-headline-lg text-headline-lg text-text-primary mb-stack-sm truncate">Midnight Drift</h1>
<p class="font-body-lg text-body-lg text-text-secondary truncate">Ethereal Sounds</p>
</div>
</div>
<!-- Bottom Control Panel (Glassmorphism) -->
<div class="absolute bottom-0 left-0 w-full z-20 flex flex-col items-center pb-margin-tablet pt-6 px-margin-mobile md:px-margin-tablet bg-surface-glass backdrop-blur-xl border-t border-white/5 rounded-t-[32px]">
<div class="w-full max-w-lg flex flex-col items-center">
<!-- Progress Bar -->
<div class="w-full mb-stack-lg px-2">
<div class="flex justify-between items-center mb-stack-sm px-1">
<span class="font-mono-sm text-mono-sm text-text-secondary">1:24</span>
<span class="font-mono-sm text-mono-sm text-text-secondary">4:05</span>
</div>
<div class="w-full h-1.5 bg-surface-variant rounded-full relative cursor-pointer group">
<div class="absolute top-0 left-0 h-full bg-primary-fixed rounded-full w-1/3"></div>
<!-- Playhead -->
<div class="absolute top-1/2 left-1/3 -translate-y-1/2 -translate-x-1/2 w-3 h-3 bg-white rounded-full shadow-md opacity-0 group-hover:opacity-100 transition-opacity"></div>
</div>
</div>
<!-- Controls -->
<div class="w-full flex items-center justify-between px-4">
<button class="text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">shuffle</span>
</button>
<div class="flex items-center gap-6">
<button class="w-12 h-12 flex items-center justify-center rounded-full text-on-surface hover:bg-surface-variant/50 transition-colors">
<span class="material-symbols-outlined text-[32px]" style="font-variation-settings: 'FILL' 1;">skip_previous</span>
</button>
<button class="w-16 h-16 flex items-center justify-center rounded-full bg-primary-fixed text-on-primary-fixed shadow-lg hover:scale-105 active:scale-95 transition-all">
<span class="material-symbols-outlined text-[36px]" style="font-variation-settings: 'FILL' 1;">pause</span>
</button>
<button class="w-12 h-12 flex items-center justify-center rounded-full text-on-surface hover:bg-surface-variant/50 transition-colors">
<span class="material-symbols-outlined text-[32px]" style="font-variation-settings: 'FILL' 1;">skip_next</span>
</button>
</div>
<button class="text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">repeat</span>
</button>
</div>
<!-- Bottom Action Row -->
<div class="w-full flex justify-between items-center mt-stack-lg px-4 opacity-70">
<button class="text-on-surface-variant hover:text-accent-heart transition-colors">
<span class="material-symbols-outlined">favorite_border</span>
</button>
<button class="text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined">volume_up</span>
</button>
</div>
</div>
</div>
