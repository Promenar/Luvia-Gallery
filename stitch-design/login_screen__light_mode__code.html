<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Luvia Gallery - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700&amp;family=Geist:wght@400;500&amp;family=Inter:wght@400&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "primary-fixed": "#d1e4ff",
                      "surface-container-high": "#262a30",
                      "on-secondary-fixed": "#0f2000",
                      "error-container": "#93000a",
                      "status-warning": "#FF9800",
                      "surface-main": "#121212",
                      "on-primary-fixed": "#001d36",
                      "text-secondary": "#B0B0B0",
                      "secondary": "#9ed75b",
                      "on-tertiary-container": "#452200",
                      "surface-container-lowest": "#0a0e14",
                      "inverse-primary": "#0061a4",
                      "on-background": "#dfe2ea",
                      "on-tertiary-fixed": "#2e1500",
                      "tertiary-fixed": "#ffdcc2",
                      "surface-glass": "rgba(30, 30, 30, 0.7)",
                      "inverse-on-surface": "#2d3137",
                      "primary-container": "#2196f3",
                      "secondary-container": "#4b7d00",
                      "error": "#ffb4ab",
                      "on-secondary": "#1e3700",
                      "surface-container": "#1c2026",
                      "on-error": "#690005",
                      "on-surface-variant": "#bfc7d4",
                      "outline-variant": "#404752",
                      "primary-fixed-dim": "#9ecaff",
                      "on-primary-fixed-variant": "#00497d",
                      "on-primary-container": "#002c4f",
                      "text-primary": "#FFFFFF",
                      "secondary-fixed": "#b9f474",
                      "surface-card": "#1E1E1E",
                      "tertiary": "#ffb77b",
                      "status-success": "#4CAF50",
                      "on-surface": "#dfe2ea",
                      "inverse-surface": "#dfe2ea",
                      "tertiary-fixed-dim": "#ffb77b",
                      "on-tertiary": "#4d2700",
                      "surface-bright": "#353940",
                      "on-secondary-fixed-variant": "#2e4f00",
                      "primary": "#9ecaff",
                      "background": "#0f1419",
                      "secondary-fixed-dim": "#9ed75b",
                      "status-error": "#F44336",
                      "accent-heart": "#F44336",
                      "on-tertiary-fixed-variant": "#6d3900",
                      "surface-variant": "#31353b",
                      "surface-container-highest": "#31353b",
                      "tertiary-container": "#db7900",
                      "surface": "#0f1419",
                      "on-error-container": "#ffdad6",
                      "surface-dim": "#0f1419",
                      "outline": "#89919d",
                      "surface-tint": "#9ecaff",
                      "on-secondary-container": "#dfffb6",
                      "on-primary": "#003258",
                      "surface-container-low": "#181c22"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {
                      "margin-mobile": "16px",
                      "gutter-grid": "8px",
                      "margin-tablet": "24px",
                      "stack-lg": "24px",
                      "stack-sm": "4px",
                      "stack-md": "12px"
              },
              "fontFamily": {
                      "headline-sm": ["Manrope", "sans-serif"],
                      "headline-md": ["Manrope", "sans-serif"],
                      "label-md": ["Geist", "sans-serif"],
                      "body-md": ["Inter", "sans-serif"],
                      "body-lg": ["Inter", "sans-serif"],
                      "headline-lg": ["Manrope", "sans-serif"],
                      "mono-sm": ["Geist", "monospace"]
              },
              "fontSize": {
                      "headline-sm": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                      "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                      "label-md": ["12px", {"lineHeight": "16px", "letterSpacing": "0.5px", "fontWeight": "500"}],
                      "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                      "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                      "headline-lg": ["32px", {"lineHeight": "40px", "fontWeight": "700"}],
                      "mono-sm": ["11px", {"lineHeight": "14px", "fontWeight": "400"}]

            }
          }
        }
    </script>
<style>
        body { background-color: #f8fafc; } /* Enforce surface background */
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen flex flex-col antialiased relative">
<!-- Top Right Actions -->
<div class="absolute top-0 right-0 p-margin-mobile flex items-center gap-stack-md z-10">
<button class="p-2 text-slate-600 hover:text-blue-600 hover:bg-slate-200 rounded-full transition-colors flex items-center justify-center">
<span class="material-symbols-outlined text-[20px]">language</span>
</button>
<button class="p-2 text-slate-600 hover:text-blue-600 hover:bg-slate-200 rounded-full transition-colors flex items-center justify-center">
<span class="material-symbols-outlined text-[20px]">light_mode</span>
</button>
</div>
<!-- Main Canvas -->
<main class="flex-grow flex flex-col items-center justify-center px-margin-mobile py-8 w-full max-w-[420px] mx-auto">
<!-- Header / Brand -->
<div class="flex flex-col items-center text-center gap-stack-sm mb-stack-lg w-full">
<div class="w-16 h-16 rounded-2xl bg-slate-100 flex items-center justify-center mb-2 shadow-sm border border-slate-200">
<span class="material-symbols-outlined text-4xl text-blue-600" style="font-variation-settings: 'FILL' 1;">photo_library</span>
</div>
<h1 class="font-headline-lg text-headline-lg text-slate-900 tracking-tight">Luvia Gallery</h1>
<p class="font-body-md text-body-md text-slate-600 mt-1">Connect to your private server</p>
</div>
<!-- Login Form Container -->
<div class="w-full bg-white rounded-xl p-6 sm:p-8 border border-slate-200 flex flex-col gap-stack-lg shadow-lg">
<form class="flex flex-col gap-stack-md">
<!-- MD3 Filled Input: Username -->
<div class="flex flex-col bg-slate-100 rounded-t-DEFAULT border-b-2 border-slate-300 focus-within:border-blue-600 transition-colors relative">
<label class="px-4 pt-2 font-mono-sm text-mono-sm text-slate-600 pointer-events-none">Username</label>
<input autocomplete="username" class="w-full bg-transparent border-none outline-none px-4 pb-2 pt-1 font-body-lg text-body-lg text-slate-900 focus:ring-0" type="text"/>
</div>
<!-- MD3 Filled Input: Password -->
<div class="flex flex-col bg-slate-100 rounded-t-DEFAULT border-b-2 border-slate-300 focus-within:border-blue-600 transition-colors relative">
<label class="px-4 pt-2 font-mono-sm text-mono-sm text-slate-600 pointer-events-none">Password</label>
<input autocomplete="current-password" class="w-full bg-transparent border-none outline-none px-4 pb-2 pt-1 font-body-lg text-body-lg text-slate-900 focus:ring-0" type="password"/>
</div>
<!-- Action Button -->
<button class="mt-4 w-full bg-blue-600 text-white rounded-full py-3 px-6 font-label-md text-label-md hover:bg-blue-700 transition-colors active:scale-[0.98] flex justify-center items-center gap-2" type="button">
                    Login
                    <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="h-px w-full bg-slate-200 my-2"></div>
<!-- Server Configuration (Expanded State shown as requested) -->
<div class="flex flex-col gap-stack-md">
<div class="flex items-center justify-between w-full cursor-pointer group">
<div class="flex items-center gap-2 text-slate-600 group-hover:text-slate-900 transition-colors">
<span class="material-symbols-outlined text-[18px]">dns</span>
<span class="font-label-md text-label-md">Server Configuration</span>
</div>
<span class="material-symbols-outlined text-slate-600 group-hover:text-slate-900 transition-colors text-[20px]">expand_less</span>
</div>
<!-- Expanded Area -->
<div class="flex flex-col bg-slate-50 rounded-lg p-4 border border-slate-200 mt-2">
<div class="flex flex-col bg-slate-100 rounded-t-DEFAULT border-b-2 border-slate-300 focus-within:border-blue-600 transition-colors">
<label class="px-4 pt-2 font-mono-sm text-mono-sm text-slate-600 pointer-events-none">Server URL</label>
<input class="w-full bg-transparent border-none outline-none px-4 pb-2 pt-1 font-body-lg text-body-lg text-slate-900 focus:ring-0" type="url" value="https://your-server.com"/>
</div>
<p class="font-mono-sm text-mono-sm text-slate-600 mt-2 px-1">Ensure the protocol (http/https) is correct.</p>
</div>
</div>
</div>
</main>
</body></html>
